naftiko: 1.0.0-alpha2
info:
  label: Dropwizard Admin API — Diagnostics
  description: 'Dropwizard Admin API — Diagnostics. 1 operations. Lead operation: Get thread dump. Self-contained Naftiko
    capability covering one Dropwizard business surface.'
  tags:
  - Dropwizard
  - Diagnostics
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DROPWIZARD_API_KEY: DROPWIZARD_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-diagnostics
    baseUri: http://localhost:8081
    description: Dropwizard Admin API — Diagnostics business capability. Self-contained, no shared references.
    resources:
    - name: threads
      path: /threads
      operations:
      - name: getthreaddump
        method: GET
        description: Get thread dump
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: admin-diagnostics-rest
    port: 8080
    description: REST adapter for Dropwizard Admin API — Diagnostics. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/threads
      name: threads
      description: REST surface for threads.
      operations:
      - method: GET
        name: getthreaddump
        description: Get thread dump
        call: admin-diagnostics.getthreaddump
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-diagnostics-mcp
    port: 9090
    transport: http
    description: MCP adapter for Dropwizard Admin API — Diagnostics. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-thread-dump
      description: Get thread dump
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-diagnostics.getthreaddump
      outputParameters:
      - type: object
        mapping: $.
